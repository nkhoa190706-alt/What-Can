kind = "web"
previewPath = "/"
title = "IoT Platform"
version = "1.0.0"
id = "artifacts/iot-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19707

[services.development]
run = "pnpm --filter @workspace/iot-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/iot-platform", "run", "build" ]
publicDir = "artifacts/iot-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19707"
BASE_PATH = "/"
